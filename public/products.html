<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produits - Boutique En Ligne</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .filter-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .filter-group select,
        .filter-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .filter-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .product-card h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 18px;
        }

        .product-card .price {
            font-weight: bold;
            color: #27ae60;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .product-card .category {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .product-card button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .product-card button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Tous les Produits</h1>

    <div class="filter-section">
        <div class="filter-controls">
            <div class="filter-group">
                <label for="categoryFilter">Catégorie</label>
                <select id="categoryFilter">
                    <option value="">Toutes les catégories</option>
                    <option value="Électronique">Électronique</option>
                    <option value="Audio">Audio</option>
                    <option value="Wearables">Wearables</option>
                    <option value="Accessoires">Accessoires</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="priceRange">Plage de prix (DT)</label>
                <select id="priceRange">
                    <option value="">Tous les prix</option>
                    <option value="0-50">0 - 50</option>
                    <option value="50-100">50 - 100</option>
                    <option value="100-200">100 - 200</option>
                    <option value="200-500">200 - 500</option>
                    <option value="500+">500+</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="searchInput">Rechercher</label>
                <input type="text" id="searchInput" placeholder="Rechercher un produit...">
            </div>
        </div>
        <div class="filter-actions">
            <button class="btn btn-secondary" onclick="resetFilters()">Réinitialiser</button>
            <button class="btn btn-primary" onclick="applyFilters()">Appliquer</button>
        </div>
    </div>

    <div class="products-grid" id="productsGrid">
        <!-- Products will be loaded here -->
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5001/api';
        let allProducts = [];
        let filteredProducts = [];

        // Load all products
        function loadProducts() {
            fetch(`${API_BASE_URL}/products`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        allProducts = data.data;
                        filteredProducts = [...allProducts];
                        displayProducts();
                    }
                })
                .catch(error => {
                    console.error('Error loading products:', error);
                });
        }

        // Display products
        function displayProducts() {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = '';

            filteredProducts.forEach(product => {
                const productCard = document.createElement('div');
                productCard.className = 'product-card';
                const imageUrl = product.imageURL || 'https://via.placeholder.com/250x150';
                productCard.innerHTML = `
                    <img src="${imageUrl}" alt="${product.nom}">
                    <h3>${product.nom}</h3>
                    <div class="price">${product.prix} DT</div>
                    <div class="category">${product.categorie}</div>
                    <button onclick="addToCart('${product._id}')">Ajouter au panier</button>
                `;
                productsGrid.appendChild(productCard);
            });
        }

        // Apply filters
        function applyFilters() {
            const category = document.getElementById('categoryFilter').value;
            const priceRange = document.getElementById('priceRange').value;
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();

            filteredProducts = allProducts.filter(product => {
                const matchesCategory = !category || product.categorie === category;
                
                let matchesPrice = true;
                if (priceRange) {
                    const [min, max] = priceRange.split('-');
                    if (max === '+') {
                        matchesPrice = product.prix >= parseInt(min);
                    } else {
                        matchesPrice = product.prix >= parseInt(min) && product.prix <= parseInt(max);
                    }
                }

                const matchesSearch = !searchQuery || 
                    product.nom.toLowerCase().includes(searchQuery) || 
                    product.description.toLowerCase().includes(searchQuery);

                return matchesCategory && matchesPrice && matchesSearch;
            });

            displayProducts();
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('categoryFilter').value = '';
            document.getElementById('priceRange').value = '';
            document.getElementById('searchInput').value = '';
            filteredProducts = [...allProducts];
            displayProducts();
        }

        // Add to cart
        function addToCart(productId) {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existingItem = cart.find(item => item.productId === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ productId, quantity: 1 });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            alert('Produit ajouté au panier!');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
            
            // Search on enter
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    applyFilters();
                }
            });
            
            // Apply category filter from URL query parameter
            const params = new URLSearchParams(window.location.search);
            const categoryParam = params.get('category');
            if (categoryParam) {
                document.getElementById('categoryFilter').value = decodeURIComponent(categoryParam);
                setTimeout(() => applyFilters(), 100);
            }
        });
    </script>
</body>
</html>
